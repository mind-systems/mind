name: mind_prod

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - db_prod_data:/var/lib/postgresql/data
    networks:
      - mind_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mind_api:
    build:
      context: ./mind_api
      target: production
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "${HOST_API_PORT}:${CONTAINER_API_PORT}"
      - "${HOST_GRPC_PORT}:${CONTAINER_GRPC_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mind_net
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:${CONTAINER_API_PORT}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mind_web:
    build:
      context: ./mind_web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      ssh:
        - default
    restart: unless-stopped
    ports:
      - "${HOST_WEB_PORT}:80"
    depends_on:
      mind_api:
        condition: service_healthy
    networks:
      - mind_net

volumes:
  db_prod_data:

networks:
  mind_net:
    driver: bridge
